name: Build Custom Runner Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set repo name to lowercase
        run: echo "REPO=${REPO,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ env.REPO }}-base:latest
          push: true
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Patch Dockerfile to use our base image
        run: sed -i "s|FROM.*|FROM ghcr.io/${{ env.REPO }}-base:latest|" Dockerfile

      - name: Build and push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ env.REPO }}:latest
          push: true
          cache-from: type=gha,scope=runner
          cache-to: type=gha,scope=runner,mode=max
